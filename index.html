<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onix Dash - Gestão por KM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #004a99; --gold: #ce9d33; --red: #eb5757; --gray: #f4f7fa; }
        body { font-family: 'Inter', sans-serif; background: var(--gray); margin: 0; padding: 15px; }
        .app { max-width: 450px; margin: auto; }
        
        .header { background: var(--blue); color: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .km-input-group { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; margin-top: 15px; }
        input { width: 100%; border: none; padding: 10px; border-radius: 8px; font-size: 18px; font-weight: bold; box-sizing: border-box; outline: none; }
        
        .card { background: white; padding: 18px; border-radius: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        h3 { margin: 0; font-size: 16px; color: #333; }
        
        .progress-bg { background: #eee; height: 8px; border-radius: 4px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; transition: 0.5s; }
        
        .info-km { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; color: #666; }
        .status-msg { font-size: 11px; margin-top: 5px; font-weight: bold; }
        
        .btn-reset { background: var(--blue); color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <span style="font-size: 12px; font-weight: 700; opacity: 0.8;">CHEVROLET ONIX LT</span>
        <h1 style="margin: 0; font-size: 22px;">Painel de Manutenção</h1>
        
        <div class="km-input-group">
            <label style="font-size: 11px; display: block; margin-bottom: 5px;">KM ATUAL DO PAINEL:</label>
            <input type="number" id="kmAtual" placeholder="Ex: 15300" oninput="calcular()">
        </div>
    </div>

    <div id="lista-manutencao"></div>
</div>

<script>
    // Configuração baseada no seu manual (Uso Severo)
    const itens = [
        { id: 'oleo', nome: 'Óleo e Filtro (5k)', intervalo: 5000 },
        { id: 'combustivel', nome: 'Filtro Combustível (10k)', intervalo: 10000 },
        { id: 'ar', nome: 'Filtro de Ar (40k)', intervalo: 40000 },
        { id: 'freio', nome: 'Fluido de Freio (2 anos)', intervalo: 20000 }, // Estimativa por KM
        { id: 'cambio', nome: 'Óleo de Câmbio (80k)', intervalo: 80000 }
    ];

    function salvarTroca(id) {
        const km = document.getElementById('kmAtual').value;
        if(!km) return alert("Digite a KM atual primeiro!");
        localStorage.setItem('ultima_troca_' + id, km);
        calcular();
    }

    function calcular() {
        const kmAtual = parseFloat(document.getElementById('kmAtual').value) || 0;
        localStorage.setItem('km_usuario', kmAtual);
        
        const container = document.getElementById('lista-manutencao');
        container.innerHTML = '';

        itens.forEach(item => {
            const ultimaTroca = parseFloat(localStorage.getItem('ultima_troca_' + item.id)) || 0;
            const kmRodados = kmAtual - ultimaTroca;
            const kmRestantes = item.intervalo - kmRodados;
            let percent = (kmRodados / item.intervalo) * 100;
            if(percent > 100) percent = 100;
            if(percent < 0) percent = 0;

            const cor = percent > 85 ? 'var(--red)' : percent > 50 ? 'var(--gold)' : '#27ae60';

            container.innerHTML += `
                <div class="card">
                    <div class="card-header">
                        <h3>${item.nome}</h3>
                        <button class="btn-reset" onclick="salvarTroca('${item.id}')">Troquei Agora</button>
                    </div>
                    <div class="progress-bg">
                        <div class="progress-fill" style="width: ${percent}%; background: ${cor}"></div>
                    </div>
                    <div class="info-km">
                        <span>Rodou: ${kmRodados} km</span>
                        <span>Faltam: ${kmRestantes <= 0 ? 'VENCIDO' : kmRestantes + ' km'}</span>
                    </div>
                    <p class="status-msg" style="color: ${cor}">
                        ${kmRestantes <= 0 ? 'MANUTENÇÃO IMEDIATA!' : 'Componente em bom estado'}
                    </p>
                </div>
            `;
        });
    }

    // Carregar KM salva ao abrir
    document.getElementById('kmAtual').value = localStorage.getItem('km_usuario');
    calcular();
</script>

</body>
</html>
