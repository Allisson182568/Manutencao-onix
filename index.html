<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onix Pro - Ciclo de Manutenção</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #121212; --normal: #2ea043; --severo: #f85149; --accent: #58a6ff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #e6edf3; margin: 0; padding: 15px; }
        .app { max-width: 500px; margin: auto; }
        
        header { background: #161b22; padding: 25px; border-radius: 20px; border: 1px solid #30363d; text-align: center; margin-bottom: 20px; }
        .km-title { font-size: 10px; font-weight: 800; color: var(--accent); letter-spacing: 2px; }
        input { background: transparent; border: none; color: white; width: 100%; font-size: 42px; font-weight: 900; text-align: center; outline: none; }

        .card { background: var(--card); border-radius: 20px; border: 1px solid #30363d; padding: 20px; margin-bottom: 15px; }
        .card-title { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; font-size: 18px; font-weight: 700; }
        
        .mode-box { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 4px solid #333; }
        .normal-border { border-left-color: var(--normal); }
        .severo-border { border-left-color: var(--severo); }

        .label-row { display: flex; justify-content: space-between; font-size: 11px; font-weight: 700; margin-bottom: 8px; }
        .bar-bg { background: #252525; height: 10px; border-radius: 5px; overflow: hidden; margin: 10px 0; }
        .bar-fill { height: 100%; transition: width 0.5s ease; }
        
        .footer-row { display: flex; justify-content: space-between; font-size: 11px; margin-top: 8px; font-weight: 600; }
        .status-tag { padding: 2px 6px; border-radius: 4px; font-size: 9px; text-transform: uppercase; }
        .vencido-tag { background: rgba(248, 81, 73, 0.2); color: var(--severo); }
        .ok-tag { background: rgba(46, 160, 67, 0.2); color: var(--normal); }
    </style>
</head>
<body>

<div class="app">
    <header>
        <div class="km-title">ODÔMETRO ATUAL</div>
        <input type="number" id="kmInput" value="55430" oninput="calculate()">
    </header>
    <div id="deck"></div>
</div>

<script>
    const ITEMS = [
        { id: 'oleo', name: 'Óleo e Filtro', icon: '🛢️', normal: 10000, severo: 5000 },
        { id: 'pneu', name: 'Rodízio de Pneus', icon: '🛞', normal: 10000, severo: 5000 },
        { id: 'comb', name: 'Filtro Combustível', icon: '⛽', normal: 10000, severo: 10000 },
        { id: 'ar', name: 'Filtro de Ar Motor', icon: '🌪️', normal: 40000, severo: 20000 }
    ];

    function calculate() {
        const km = parseInt(document.getElementById('kmInput').value) || 0;
        const deck = document.getElementById('deck');
        deck.innerHTML = '';

        ITEMS.forEach(item => {
            // Lógica para Uso Normal
            const cicloNormal = Math.floor(km / item.normal);
            const ultimaNormal = cicloNormal * item.normal;
            const proximaNormal = ultimaNormal + item.normal;
            const rodadoNormal = km - ultimaNormal;
            const percNormal = Math.min((rodadoNormal / item.normal) * 100, 100);

            // Lógica para Uso Severo
            const cicloSevero = Math.floor(km / item.severo);
            const ultimaSevero = cicloSevero * item.severo;
            const proximaSevero = ultimaSevero + item.severo;
            const rodadoSevero = km - ultimaSevero;
            const percSevero = Math.min((rodadoSevero / item.severo) * 100, 100);

            deck.innerHTML += `
                <div class="card">
                    <div class="card-title">${item.icon} ${item.name}</div>
                    
                    <div class="mode-box normal-border">
                        <div class="label-row">
                            <span style="color:var(--normal)">USO NORMAL</span>
                            <span>${percNormal.toFixed(1)}%</span>
                        </div>
                        <div class="bar-bg"><div class="bar-fill" style="width:${percNormal}%; background:var(--normal)"></div></div>
                        <div class="footer-row">
                            <span>Próxima: ${proximaNormal.toLocaleString()} km</span>
                            <span class="status-tag ok-tag">Faltam ${(proximaNormal - km).toLocaleString()} km</span>
                        </div>
                    </div>

                    <div class="mode-box severo-border">
                        <div class="label-row">
                            <span style="color:var(--severo)">USO SEVERO (Uber/99)</span>
                            <span>${percSevero.toFixed(1)}%</span>
                        </div>
                        <div class="bar-bg"><div class="bar-fill" style="width:${percSevero}%; background:var(--severo)"></div></div>
                        <div class="footer-row">
                            <span>Deveria ter feito: ${ultimaSevero.toLocaleString()} km</span>
                            <span class="status-tag vencido-tag">Atraso: ${rodadoSevero.toLocaleString()} km</span>
                        </div>
                    </div>
                </div>
            `;
        });
    }
    calculate();
</script>
</body>
</html>
