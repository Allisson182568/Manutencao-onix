<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onix Pro - Gestão de Manutenção</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #004a99;
            --accent: #ce9d33;
            --success: #27ae60;
            --danger: #eb5757;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1a1a1a;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
        }

        header {
            background: var(--primary);
            color: white;
            padding: 25px;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .progress-container {
            background: rgba(255,255,255,0.2);
            height: 8px;
            border-radius: 4px;
            margin-top: 15px;
        }

        #progress-bar {
            background: var(--accent);
            height: 100%;
            width: 0%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 0 0 20px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .item-row {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            border: 1px solid #edf0f3;
            transition: all 0.2s;
            cursor: pointer;
        }

        .item-row:active { transform: scale(0.98); }

        .item-row.checked {
            background-color: #f1f9f4;
            border-color: var(--success);
        }

        .checkbox-custom {
            width: 24px;
            height: 24px;
            border: 2px solid #ddd;
            border-radius: 6px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .checked .checkbox-custom {
            background: var(--success);
            border-color: var(--success);
        }

        .checked .checkbox-custom::after {
            content: '✓';
            color: white;
            font-weight: bold;
        }

        .info { flex: 1; }
        .info h4 { margin: 0; font-size: 1rem; }
        .info p { margin: 2px 0 0; font-size: 0.75rem; color: #666; }

        .badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 700;
            margin-left: 5px;
        }
        .b-severo { background: #ffebeb; color: var(--danger); }
        .b-norm { background: #eef4fb; color: var(--primary); }

        footer { text-align: center; margin-top: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <span style="font-size: 12px; opacity: 0.8; font-weight: 600;">MY CHEVROLET</span>
        <h1 style="margin: 5px 0 0; font-size: 24px;">Onix Plus / Hatch</h1>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <p id="stats" style="font-size: 12px; margin-top: 8px;">0% concluído</p>
    </header>

    <div class="card" id="checklist">
        </div>

    <footer>
        Dados sincronizados localmente • Manual Págs 95-99
    </footer>
</div>

<script>
    const manutencoes = [
        { id: 1, title: "Óleo do Motor", desc: "Uso Severo: 5k km / 6 meses", severo: true },
        { id: 2, title: "Filtro de Óleo", desc: "Substituir com o óleo", severo: true },
        { id: 3, title: "Filtro de Combustível", desc: "A cada 10.000 km", severo: true },
        { id: 4, title: "Filtro de Ar Motor", desc: "40k km (Inspecionar 20k)", severo: false },
        { id: 5, title: "Fluido de Freio", desc: "A cada 2 anos (DOT 4 LV)", severo: true },
        { id: 6, title: "Câmbio Automático", desc: "80k km (Uso Severo)", severo: true },
        { id: 7, title: "Velas de Ignição", desc: "A cada 100.000 km", severo: false },
        { id: 8, title: "Correia Dentada", desc: "240k km ou 15 anos", severo: false }
    ];

    const checklistElement = document.getElementById('checklist');

    function updateUI() {
        const checks = JSON.parse(localStorage.getItem('onixChecks') || '{}');
        checklistElement.innerHTML = '';
        
        let checkedCount = 0;

        manutencoes.forEach(item => {
            const isChecked = checks[item.id];
            if(isChecked) checkedCount++;

            const row = document.createElement('div');
            row.className = `item-row ${isChecked ? 'checked' : ''}`;
            row.onclick = () => toggleItem(item.id);

            row.innerHTML = `
                <div class="checkbox-custom"></div>
                <div class="info">
                    <h4>${item.title} ${item.severo ? '<span class="badge b-severo">Severo</span>' : ''}</h4>
                    <p>${item.desc}</p>
                </div>
            `;
            checklistElement.appendChild(row);
        });

        const percent = Math.round((checkedCount / manutencoes.length) * 100);
        document.getElementById('progress-bar').style.width = percent + '%';
        document.getElementById('stats').innerText = `${percent}% da manutenção concluída`;
    }

    function toggleItem(id) {
        const checks = JSON.parse(localStorage.getItem('onixChecks') || '{}');
        checks[id] = !checks[id];
        localStorage.setItem('onixChecks', JSON.stringify(checks));
        updateUI();
    }

    updateUI();
</script>

</body>
</html>
