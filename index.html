<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onix Pro - Gestão de Frota</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c10;
            --card-bg: #161b22;
            --primary: #58a6ff;
            --severo: #f85149;
            --normal: #30a14e;
            --text: #c9d1d9;
            --gold: #d29922;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .app-container { width: 100%; max-width: 600px; animation: fadeIn 0.8s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        header {
            background: linear-gradient(135deg, #161b22 0%, #0d1117 100%);
            padding: 30px 20px;
            border-radius: 24px;
            border: 1px solid #30363d;
            margin-bottom: 20px;
            text-align: center;
        }

        .km-badge {
            background: var(--primary);
            color: #000;
            padding: 4px 12px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
        }

        input[type="number"] {
            background: #0d1117;
            border: 2px solid #30363d;
            color: white;
            width: 80%;
            padding: 15px;
            border-radius: 15px;
            font-size: 28px;
            text-align: center;
            margin-top: 15px;
            font-weight: 800;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--primary); outline: none; }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #30363d;
            position: relative;
            overflow: hidden;
        }

        .card h3 { margin: 0 0 15px 0; font-size: 18px; display: flex; align-items: center; justify-content: space-between; }

        .history-tag { font-size: 10px; color: var(--gold); opacity: 0.8; }

        /* Barras de Progresso Lado a Lado */
        .bars-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        
        .bar-group { position: relative; }
        .bar-label { font-size: 10px; font-weight: 700; margin-bottom: 5px; display: block; text-transform: uppercase; }
        
        .progress-bg { background: #0d1117; height: 6px; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; transition: width 1s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        .km-remain { font-size: 11px; margin-top: 5px; display: block; font-weight: 600; }

        .btn-reset {
            width: 100%;
            background: transparent;
            border: 1px solid #30363d;
            color: var(--text);
            padding: 10px;
            border-radius: 10px;
            margin-top: 15px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-reset:hover { background: #30363d; color: white; }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <span class="km-badge">Painel de Monitoramento</span>
        <input type="number" id="kmInput" placeholder="000000" oninput="updateAll()">
        <p style="font-size: 12px; margin-top: 10px; opacity: 0.6;">Insira a quilometragem atual do odômetro</p>
    </header>

    <div id="deck"></div>
</div>

<script>
    const CONFIG = [
        { id: 'oleo', name: 'Óleo do Motor e Filtro', normal: 10000, severo: 5000, desc: 'Dexos 1 Gen 3' },
        { id: 'combustivel', name: 'Filtro de Combustível', normal: 10000, severo: 10000, desc: 'Troca Preventiva' },
        { id: 'pneu', name: 'Rodízio de Pneus', normal: 10000, severo: 5000, desc: 'Cruzar em X' },
        { id: 'ar_motor', name: 'Filtro de Ar (Motor)', normal: 40000, severo: 20000, desc: 'Elemento Filtrante' },
        { id: 'cabine', name: 'Filtro de Ar Condicionado', normal: 20000, severo: 10000, desc: 'Saúde Interna' },
        { id: 'freio_fluido', name: 'Fluido de Freio', normal: 20000, severo: 20000, desc: 'DOT 4 LV (2 anos)' },
        { id: 'velas', name: 'Velas de Ignição', normal: 100000, severo: 100000, desc: 'Original Iridium' },
        { id: 'cambio', name: 'Óleo Câmbio Automático', normal: 160000, severo: 80000, desc: 'Dexron VI' },
        { id: 'arrefecimento', name: 'Líquido Arrefecimento', normal: 150000, severo: 150000, desc: 'Aditivo ACDelco Rosa' },
        { id: 'correia_acess', name: 'Correia de Acessórios', normal: 120000, severo: 120000, desc: 'Alternador/AC' },
        { id: 'correia_dentada', name: 'Correia Dentada (Banhada)', normal: 240000, severo: 240000, desc: 'Crucial: Óleo Correto' }
    ];

    function updateAll() {
        const kmAtual = parseInt(document.getElementById('kmInput').value) || 0;
        localStorage.setItem('km_save', kmAtual);
        const deck = document.getElementById('deck');
        deck.innerHTML = '';

        CONFIG.forEach(item => {
            const ultimaTroca = parseInt(localStorage.getItem('last_'+item.id)) || 0;
            const rodado = kmAtual - ultimaTroca;
            
            // Cálculos
            const pSev = Math.min((rodado / item.severo) * 100, 100);
            const pNorm = Math.min((rodado / item.normal) * 100, 100);
            const rSev = item.severo - rodado;
            const rNorm = item.normal - rodado;
            const trocasRealizadas = Math.floor(kmAtual / item.severo);

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <h3>
                    <span>${item.name}</span>
                    <span class="history-tag">Est. ${trocasRealizadas}x trocados</span>
                </h3>
                <p style="font-size: 11px; margin-top: -10px; opacity: 0.5;">${item.desc}</p>
                
                <div class="bars-container">
                    <div class="bar-group">
                        <span class="bar-label" style="color:var(--severo)">Uso Severo</span>
                        <div class="progress-bg"><div class="progress-fill" style="width:${pSev}%; background:var(--severo)"></div></div>
                        <span class="km-remain" style="color:${rSev <= 0 ? 'var(--severo)' : 'var(--text)'}">${rSev <= 0 ? 'VENCIDO' : 'Faltam '+rSev+'km'}</span>
                    </div>
                    <div class="bar-group">
                        <span class="bar-label" style="color:var(--normal)">Uso Normal</span>
                        <div class="progress-bg"><div class="progress-fill" style="width:${pNorm}%; background:var(--normal)"></div></div>
                        <span class="km-remain">${rNorm <= 0 ? 'VENCIDO' : 'Faltam '+rNorm+'km'}</span>
                    </div>
                </div>

                <button class="btn-reset" onclick="resetItem('${item.id}')">Registrar Manutenção</button>
            `;
            deck.appendChild(card);
        });
    }

    function resetItem(id) {
        const km = document.getElementById('kmInput').value;
        if(!km) return alert("Insira a quilometragem atual!");
        localStorage.setItem('last_'+id, km);
        updateAll();
    }

    // Init
    const savedKm = localStorage.getItem('km_save');
    if(savedKm) {
        document.getElementById('kmInput').value = savedKm;
        updateAll();
    }
</script>

</body>
</html>
